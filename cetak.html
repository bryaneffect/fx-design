<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Desain Media Cetak - bryfx</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #000;
      --fg: #f7f7f7;
      --accent: #ffffff;
      --green: #99FF00;
      --muted: #b3b3b3;
      --border: #ffffff;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      font-size: 0.8em;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
  min-height: 100vh;
  font-family: Inter, system-ui, sans-serif;
  color: var(--fg);
  line-height: 1.6;

  background:
    radial-gradient(
      circle at 75% 0%,
      rgba(72, 255, 0, 0.35) 0%,
      rgba(27, 160, 0, 0.15) 20%,
      transparent 45%
    ),

    radial-gradient(
      circle at 50% -20%,
      rgba(30, 255, 0, 0.12) 0%,
      transparent 40%
    ),

    radial-gradient(
      circle at 20% 50%,
      rgba(72, 255, 0, 0.12) 0%,
      transparent 35%
    ),

    radial-gradient(
      circle at 80% 60%,
      rgba(72, 255, 0, 0.10) 0%,
      transparent 40%
    ),

    radial-gradient(
      circle at 50% 100%,
      rgba(72, 255, 0, 0.18) 0%,
      rgba(27, 160, 0, 0.08) 25%,
      transparent 55%
    ),

    linear-gradient(
      180deg,
      #1a1a22 0%,
      #12131a 25%,
      #0a0b12 60%,
      #05060b 100%
    );

  background-attachment: scroll;
  position: relative;
}
body::after {
  content: "";
  position: absolute;
  top: -300px;
  left: 50%;
  transform: translateX(-50%);
  width: 900px;
  height: 900px;
  border-radius: 50%;

  background:
    radial-gradient(
      circle,
      rgba(60, 255, 0, 0.15) 0%,
      rgba(0, 168, 8, 0.08) 30%,
      transparent 70%
    );

  filter: blur(80px);
  pointer-events: none;
  z-index: -3;
}
body::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    repeating-linear-gradient(
      90deg,
      rgba(255,255,255,0.03) 0px,
      rgba(255,255,255,0.03) 1px,
      transparent 1px,
      transparent 32px
    );

  mask-image: linear-gradient(
    to bottom,
    rgba(255,255,255,0.8),
    transparent 60%
  );

  z-index: -2;
}
.green {
  color: var(--green);
  text-shadow:
    0 0 5px rgba(153,255,0,.8),
    0 0 15px rgba(153,255,0,.5),
    0 0 30px rgba(153,255,0,.3);
}

    .container {
      width: min(1140px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 2rem 0 2.5rem;
      opacity: 0;
      animation: fadeInPage 0.9s ease-out 0.1s forwards;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }

    .brand-logo {
      display: block;
      max-height: 2.5rem;
      width: auto;
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
      margin-left: 1rem;
      transition: color 0.2s ease;
    }

    nav a:hover {
      color: var(--accent);
    }

    .hero {
      padding: 2.5rem 0;
    }

    .hero-title {
      font-size: clamp(2.25rem, 4.5vw, 4.05rem);
      line-height: 0.95;
      margin-bottom: 1rem;
      letter-spacing: -0.04em;
      opacity: 0;
      animation: fadeUp 0.8s ease-out 0.15s forwards;
    }

    .hero-text {
      max-width: 42rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .section {
      padding: 2.5rem 0;
    }

    .section-heading {
      display: flex;
      align-items: center;
      font-size: clamp(2.7rem, 5.4vw, 4.5rem);
      font-weight: 800;
      letter-spacing: -0.08em;
      margin-bottom: 1.2rem;
      color: var(--accent);
      gap: 1rem;
      width: 100%;
    }

    .section-heading::before {
      content: "";
      width: 1rem;
      height: 1rem;
      min-width: 1rem;
      background: var(--accent);
      border-radius: 0.35rem;
      flex-shrink: 0;
    }

    .section-heading::after {
      content: "";
      flex: 1;
      height: 2px;
      background: rgb(255,255,255);
      margin-left: 1rem;
    }

    .cards {
      display: grid;
      gap: 1rem;
    }

    .card {
      padding: 1.6rem;
      border-radius: 24px;
      border: 1px solid #ffffff;
      background: rgba(255,255,255,0.03);
      box-shadow: 0 24px 40px rgba(0,0,0,0.18);
      margin-top: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease-out 0.2s forwards;
    }

    .card h3 {
      margin-bottom: 1rem;
      font-size: 1.3rem;
    }

    .card img {
      width: 357.12px;
      height: 929.9px;
      object-fit: cover;
      border-radius: 20px;
      display: block;
      margin: 1rem auto;
      max-width: 100%;
    }

    .card p {
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .button,
    .button.secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.85rem 1.5rem;
      border-radius: 999px;
      font-weight: 600;
      border: 1px solid #ffffff;
      transition: transform 0.2s ease, background-color 0.2s ease, border-color 0.2s ease;
      text-decoration: none;
    }

    .button {
      background: var(--accent);
      color: var(--bg);
    }

    .button:hover,
    .button.secondary:hover {
      transform: translateY(-2px);
    }

    .button.secondary {
      background: transparent;
      color: var(--fg);
      border-color: #ffffff;
    }

    footer {
      padding-top: 1.5rem;
      border-top: 1px solid #ffffff;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    header {
  flex-direction: row;
  justify-content: space-between;
  align-items: center;
  gap: 0.5rem;
}

  nav {
  display: flex;
  justify-content: flex-end;
  flex-wrap: wrap;
  gap: 0.5rem;
  width: auto;
}

  nav a {
    margin: 0;
    padding: 0.5rem 1rem;
    border: 1px solid #ffffff;
    border-radius: 999px;
    background: rgba(255,255,255,0.05);
    font-size: 0.85rem;
  }

  .container {
    padding: 1rem 1rem 1.5rem;
  }

  footer {
    flex-direction: column;
  }
      .container {
        padding: 1rem 0 1.5rem;
      }
      .hero {
        padding: 1.5rem 0;
      }
      .hero-title {
        font-size: clamp(1.9rem, 8vw, 3rem);
      }
      .card {
        padding: 1.4rem;
      }
      .card img {
        width: 100%;
        height: auto;
        max-width: 357.12px;
      }
      footer {
        flex-direction: column;
      }

    @media (max-width: 480px) {
      .section-heading {
        font-size: clamp(1.8rem, 6vw, 2.4rem);
        gap: 0.6rem;
        margin-bottom: 0.9rem;
        align-items: flex-start;
      }

      .section-heading::before {
        width: 0.7rem;
        height: 0.7rem;
        min-width: 0.7rem;
        margin-top: 0.15rem;
      }

      .section-heading::after {
        content: "";
        flex: 1;
        height: 1px;
        background: rgb(255,255,255);
        margin-left: 0.75rem;
        align-self: center;
      }

      .hero-title {
        font-size: clamp(1.8rem, 8vw, 2.6rem);
      }
    }

    @keyframes fadeInPage {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .particle {
      position: fixed;
      width: 0.8rem;
      height: 0.8rem;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 50%;
      pointer-events: none;
      z-index: -1;
      animation: float 10s infinite linear;
      box-shadow: 0 0 20px rgba(255,255,255,0.08);
    }

    @keyframes float {
      0% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(100px, -50px) rotate(90deg); }
      50% { transform: translate(-50px, 100px) rotate(180deg); }
      75% { transform: translate(150px, 50px) rotate(270deg); }
      100% { transform: translate(0, 0) rotate(360deg); }
    }

    .particle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
    .particle:nth-child(2) { left: 30%; top: 40%; animation-delay: 2s; }
    .particle:nth-child(3) { left: 50%; top: 60%; animation-delay: 4s; }
    .particle:nth-child(4) { left: 70%; top: 30%; animation-delay: 6s; }
    .particle:nth-child(5) { left: 90%; top: 50%; animation-delay: 8s; }
    .particle:nth-child(6) { left: 20%; top: 70%; animation-delay: 1s; }
    .particle:nth-child(7) { left: 60%; top: 10%; animation-delay: 3s; }
    .particle:nth-child(8) { left: 80%; top: 80%; animation-delay: 5s; }
    .particle:nth-child(9) { left: 5%; top: 35%; animation-delay: 7s; }
    .particle:nth-child(10) { left: 25%; top: 55%; animation-delay: 9s; }
    .particle:nth-child(11) { left: 45%; top: 15%; animation-delay: 0.5s; }
    .particle:nth-child(12) { left: 65%; top: 75%; animation-delay: 2.5s; }
  </style>
</head>

      <a class="brand" href="index.html">

      <h1 class="hero-title">
  Desain <span class="green">Media Cetak</span>

      <p class="hero-text">Desain visual untuk platform media cetak Anda.</p>
    </section>

    <section class="section">
      <h2 class="section-heading">Portofolio <span class="green">Desain</span></h2>
      <div class="cards">

          <img src="https://l.top4top.io/p_3788dk6q91.png" alt="Portofolio Desain Cetak" />
          <a href="index.html" class="button secondary">
             <span class="green">Kembali ke Beranda</span>
</a>
        </article>
      </div>
    </section>

    <footer id="contact">

    </footer>
  </div>
</body>
